<script>
(function() {
  window._ttydSocket = null;
  var OrigWebSocket = window.WebSocket;
  window.WebSocket = function(url, protocols) {
    var ws = protocols ? new OrigWebSocket(url, protocols) : new OrigWebSocket(url);
    if (url && url.indexOf('/ws') !== -1) {
      window._ttydSocket = ws;
    }
    return ws;
  };
  window.WebSocket.prototype = OrigWebSocket.prototype;
  window.WebSocket.CONNECTING = OrigWebSocket.CONNECTING;
  window.WebSocket.OPEN = OrigWebSocket.OPEN;
  window.WebSocket.CLOSING = OrigWebSocket.CLOSING;
  window.WebSocket.CLOSED = OrigWebSocket.CLOSED;

  function getSocket() {
    return window._ttydSocket || window.socket || window.ws;
  }

  function waitForTerm(cb) {
    if (window.term) { cb(window.term); return; }
    var i = setInterval(function() {
      if (window.term) { clearInterval(i); cb(window.term); }
    }, 50);
  }

  function sendToTTYD(data) {
    var socket = getSocket();
    if (socket && socket.readyState === 1) {
      socket.send('0' + data);
      return true;
    }
    return false;
  }

  function isAlternateScreen(term) {
    var isAlt = false;
    try {
      if (term.buffer && term.buffer.active) {
        isAlt = term.buffer.active.type === 'alternate';
      }
      if (!isAlt && term._core && term._core.buffer) {
        isAlt = term._core.buffer.active === term._core.buffer.alternate;
      }
    } catch(err) {}
    return isAlt;
  }

  waitForTerm(function(term) {
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        e.stopPropagation();

        var data = e.shiftKey ? '\x1b[Z' : '\t';

        if (sendToTTYD(data)) return;

        if (term._core && term._core.coreService) {
          term._core.coreService.triggerDataEvent(data);
          return;
        }

        if (term.input) {
          term.input(data);
        }
      }
    }, true);

    document.addEventListener('wheel', function(e) {
      e.preventDefault();

      if (isAlternateScreen(term)) return;

      e.stopPropagation();

      var lines;
      if (e.deltaMode === 1) {
        lines = e.deltaY;
      } else if (e.deltaMode === 2) {
        lines = e.deltaY > 0 ? term.rows : -term.rows;
      } else {
        lines = Math.round(e.deltaY / 40);
      }
      if (lines === 0) lines = e.deltaY > 0 ? 1 : -1;

      term.scrollLines(lines);
    }, { passive: false, capture: true });

    window.sendTabKey = function(shift) {
      var data = shift ? '\x1b[Z' : '\t';
      if (sendToTTYD(data)) return true;
      if (term._core && term._core.coreService) {
        term._core.coreService.triggerDataEvent(data);
        return true;
      }
      if (term.input) {
        term.input(data);
        return true;
      }
      return false;
    };

    window.isTerminalAlternateScreen = function() {
      return isAlternateScreen(term);
    };

    window.scrollTerminalLines = function(lines) {
      if (!term.scrollLines) return false;
      term.scrollLines(lines);
      return true;
    };

    var touchActive = false;
    var touchLastY = 0;
    var touchRemainder = 0;
    var TOUCH_LINE_HEIGHT = 24;

    function resetTouch() {
      touchActive = false;
      touchLastY = 0;
      touchRemainder = 0;
    }

    document.addEventListener('touchstart', function(e) {
      if (e.touches.length !== 1) { resetTouch(); return; }
      touchActive = true;
      touchLastY = e.touches[0].clientY;
      touchRemainder = 0;
    }, { capture: true, passive: true });

    document.addEventListener('touchmove', function(e) {
      if (!touchActive) return;
      if (e.touches.length !== 1) { resetTouch(); return; }
      if (isAlternateScreen(term)) return;

      var deltaY = e.touches[0].clientY - touchLastY;
      if (deltaY === 0) return;
      touchLastY = e.touches[0].clientY;
      touchRemainder += deltaY;

      e.preventDefault();
      e.stopPropagation();

      var steps = Math.trunc(touchRemainder / TOUCH_LINE_HEIGHT);
      if (steps === 0) return;
      touchRemainder -= steps * TOUCH_LINE_HEIGHT;
      term.scrollLines(-steps);
    }, { passive: false, capture: true });

    document.addEventListener('touchend', function() {
      if (touchActive) {
        var ta = document.querySelector('.xterm-helper-textarea');
        if (ta) ta.focus();
      }
      resetTouch();
    }, { capture: true, passive: true });
    document.addEventListener('touchcancel', resetTouch, { capture: true, passive: true });
  });
})();
</script>
